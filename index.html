const DB_NAME='ai-ppr-db',DB_VER=2;
function idb(){return new Promise((ok,no)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result,tx=e.target.transaction;if(!d.objectStoreNames.contains('papers')){const s=d.createObjectStore('papers',{keyPath:'id'});s.createIndex('username','username',{unique:false});}else if(!tx.objectStore('papers').indexNames.contains('username')){tx.objectStore('papers').createIndex('username','username',{unique:false});}if(!d.objectStoreNames.contains('users'))d.createObjectStore('users',{keyPath:'username'});};r.onsuccess=e=>ok(e.target.result);r.onerror=e=>no(e.target.error);});}
async function dbPut(s,o){const db=await idb();return new Promise((ok,no)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).put(o);t.oncomplete=ok;t.onerror=no;});}
async function dbGet(s,k){const db=await idb();return new Promise((ok,no)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).get(k);r.onsuccess=()=>ok(r.result);r.onerror=no;});}
async function dbGetAll(s){const db=await idb();return new Promise((ok,no)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>ok(r.result);r.onerror=no;});}
async function dbGetByUser(s,u){const db=await idb();return new Promise((ok,no)=>{const t=db.transaction(s,'readonly');const idx=t.objectStore(s).index('username');const r=idx.getAll(u);r.onsuccess=()=>ok(r.result);r.onerror=no;});}

const callLlmAPI=async(prompt,modelSource,apiKey)=>{if(modelSource==='deepseek'){const r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},body:JSON.stringify({model:"deepseek-chat",messages:[{role:"user",content:prompt}],stream:false})});if(!r.ok)throw new Error(`DeepSeek Error: ${r.status}`);return(await r.json()).choices[0].message.content;}else{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});if(!r.ok){if(r.status===429)throw new Error("429");throw new Error(`Gemini Error: ${r.status}`);}return(await r.json()).candidates?.[0]?.content?.parts?.[0]?.text;}};

const renderMarkdown=(text)=>{if(!text)return{__html:""};const mathBlocks=[];let html=text.replace(/\$\$([\s\S]*?)\$\$/g,(_,m)=>{const i=mathBlocks.length;try{mathBlocks.push(katex.renderToString(m.trim(),{displayMode:true,throwOnError:false}));}catch(e){mathBlocks.push(`<code>${m}</code>`);}return`%%MD${i}%%`;}).replace(/\$(.+?)\$/g,(_,m)=>{const i=mathBlocks.length;try{mathBlocks.push(katex.renderToString(m.trim(),{displayMode:false,throwOnError:false}));}catch(e){mathBlocks.push(`<code>${m}</code>`);}return`%%MI${i}%%`;});html=html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br/>');html=`<p>${html}</p>`.replace(/%%MD(\d+)%%/g,(_,i)=>mathBlocks[parseInt(i)]).replace(/%%MI(\d+)%%/g,(_,i)=>mathBlocks[parseInt(i)]);return{__html:html};};

const hashStr=(s)=>{let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(16);};

function App(){
const[username,setUsername]=useState(localStorage.getItem('ppr_user')||'');
const[loginInput,setLoginInput]=useState('');
const[recentUsers,setRecentUsers]=useState([]);
const[modelSource,setModelSource]=useState(localStorage.getItem('llm_source')||'gemini');
const[geminiKey,setGeminiKey]=useState(localStorage.getItem('gemini_api_key')||'');
const[deepseekKey,setDeepseekKey]=useState(localStorage.getItem('deepseek_api_key')||'');
const[showSettings,setShowSettings]=useState(false);
const[pdfDoc,setPdfDoc]=useState(null);
const[pageNum,setPageNum]=useState(1);
const[numPages,setNumPages]=useState(0);
const[isRendering,setIsRendering]=useState(false);
const[pageText,setPageText]=useState("");
const canvasRef=useRef(null);
const[aiMode,setAiMode]=useState('cards');
const[pageAiData,setPageAiData]=useState({});
const[chatHistory,setChatHistory]=useState([]);
const[chatInput,setChatInput]=useState("");
const[isChatting,setIsChatting]=useState(false);
const chatScrollRef=useRef(null);
const mainRef=useRef(null);
const[split1,setSplit1]=useState(30);
const[split2,setSplit2]=useState(25);
const[dragTarget,setDragTarget]=useState(null);
const noteRef=useRef(null);
const[noteContent,setNoteContent]=useState('');
const[paperName,setPaperName]=useState('');
const[showFormula,setShowFormula]=useState(false);
const[formulaInput,setFormulaInput]=useState('');
const[formulaPreview,setFormulaPreview]=useState('');
const[showDrawing,setShowDrawing]=useState(false);
const[showTableGrid,setShowTableGrid]=useState(false);
const[tableHover,setTableHover]=useState({r:0,c:0});
const[isScreenshotMode,setIsScreenshotMode]=useState(false);
const[screenshotRect,setScreenshotRect]=useState(null);
const screenshotStart=useRef(null);
const drawCanvasRef=useRef(null);
const[drawColor,setDrawColor]=useState('#1e293b');
const[drawSize,setDrawSize]=useState(3);
const[drawEraser,setDrawEraser]=useState(false);
const drawCtxRef=useRef(null);
const drawIsDrawing=useRef(false);
const[showSidebar,setShowSidebar]=useState(false);
const[showPDF,setShowPDF]=useState(true);

const onDiv1Down=()=>setDragTarget(1);

const onDragUp=()=>setDragTarget(null);
const onDragMove=(e)=>{if(!dragTarget||!mainRef.current)return;const r=mainRef.current.getBoundingClientRect();const pct=((e.clientX-r.left)/r.width)*100;if(dragTarget===1)setSplit1(Math.max(15,Math.min(55,pct)));else{const notesPct=100-pct;const maxNotes=100-split1-15;setSplit2(Math.max(15,Math.min(maxNotes,notesPct)));}};

const loadHistory=useCallback(async(u)=>{const papers=await dbGetByUser('papers',u);setPaperHistory(papers.sort((a,b)=>b.visitedAt-a.visitedAt));},[]);

useEffect(()=>{dbGetAll('users').then(u=>setRecentUsers(u.map(x=>x.username)));},[]);

const doLogin=()=>{const u=loginInput.trim();if(!u)return;localStorage.setItem('ppr_user',u);setUsername(u);dbPut('users',{username:u,lastLogin:Date.now()});loadHistory(u);};
const doLogout=()=>{localStorage.removeItem('ppr_user');setUsername('');setPdfDoc(null);setPageAiData({});setChatHistory([]);setNoteContent('');setPaperName('');setPaperHistory([]);};

const restorePaper=useCallback(async(pdfObj,numP)=>{if(!username)return;const fp=hashStr(username+'|'+(pdfObj._pdfInfo?.fingerprint||'no-fp')+'|'+numP);const saved=await dbGet('papers',fp);if(saved){setPageAiData(saved.pageAiData||{});setChatHistory(saved.chatHistory||[]);setNoteContent(saved.noteContent||'');setPaperName(saved.paperName||'');if(saved.showPDF!==undefined)setShowPDF(saved.showPDF);if(saved.showAI!==undefined)setShowAI(saved.showAI);if(saved.showNotes!==undefined)setShowNotes(saved.showNotes);}return fp;},[username]);
const autoSave=useCallback(async(fp,data)=>{if(!username||!fp)return;await dbPut('papers',{id:fp,username,...data,visitedAt:Date.now()});loadHistory(username);},[username]);

const handleFileUpload=async(event)=>{const file=event.target.files[0];if(!file)return;try{setIsRendering(true);const wm=[{role:'ai',text:"文献已载入。我是您的 AI 助教，支持 Gemini 和 DeepSeek 双引擎。您可以随时向我提问。"}];setPageAiData({});setChatHistory(wm);const ab=await file.arrayBuffer();const loaded=await window.pdfjsLib.getDocument({data:ab}).promise;setPdfDoc(loaded);setNumPages(loaded.numPages);setPageNum(1);setIsRendering(false);const fp=await restorePaper(loaded,loaded.numPages);setPaperFp(fp);const pn=paperName||file.name.replace(/\.pdf$/i,'');if(!paperName)setPaperName(pn);await autoSave(fp,{pageAiData:{},chatHistory:wm,noteContent:'',paperName:pn,showPDF,showAI,showNotes,pageCount:loaded.numPages,fileName:file.name});}catch(e){alert("PDF 加载失败");setIsRendering(false);}};

useEffect(()=>{let rt=null;const rp=async()=>{if(!pdfDoc||!canvasRef.current)return;setIsRendering(true);try{const page=await pdfDoc.getPage(pageNum);const vp=page.getViewport({scale:1.5});const c=canvasRef.current;c.height=vp.height;c.width=vp.width;rt=page.render({canvasContext:c.getContext('2d'),viewport:vp});await rt.promise;const tc=await page.getTextContent();setPageText(tc.items.map(i=>i.str).join(" ").replace(/\s+/g," "));}catch(e){console.error('PDF render error:',e);}finally{setIsRendering(false);}};rp();return()=>rt?.cancel();},[pdfDoc,pageNum]);

useEffect(()=>{if(pdfDoc&&paperFp){autoSave(paperFp,{pageAiData,chatHistory,noteContent,paperName,showPDF,showAI,showNotes});}},[pageAiData,chatHistory,noteContent,paperFp,paperName,showPDF,showAI,showNotes]);
useEffect(()=>{if(aiMode==='chat'&&chatScrollRef.current)chatScrollRef.current.scrollTop=chatScrollRef.current.scrollHeight;},[chatHistory,isChatting,aiMode]);

const triggerAI=async(actionType)=>{const key=modelSource==='gemini'?geminiKey:deepseekKey;if(!key)return setShowSettings(true);if(!pageText)return alert("当前页无文本");const targetPage=pageNum;const currentData=pageAiData[targetPage]||{};if(currentData[actionType]?.status==='success'){setPageAiData(prev=>({...prev,[targetPage]:{...prev[targetPage],[actionType]:{...prev[targetPage][actionType],isExpanded:true}}}));return;}if(currentData[actionType]?.status==='loading')return;setPageAiData(prev=>({...prev,[targetPage]:{...prev[targetPage],[actionType]:{status:'loading',data:'',isExpanded:true}}}));const prompts={translate:`翻译以下学术段落为地道中文，保留 LaTeX 公式（用 $...$ 或 $$...$$ 包裹）：\n${pageText}`,explain:`用直白大白话（带比喻）讲解本页物理核心，保留 LaTeX 公式（用 $...$ 或 $$...$$ 包裹）：\n${pageText}`};try{const result=await callLlmAPI(prompts[actionType],modelSource,key);setPageAiData(prev=>({...prev,[targetPage]:{...prev[targetPage],[actionType]:{status:'success',data:result,isExpanded:true}}}));}catch(error){let msg="请求失败";if(error.message==="429")msg="频率受限，请稍后";setPageAiData(prev=>({...prev,[targetPage]:{...prev[targetPage],[actionType]:{status:'error',data:msg,isExpanded:true}}}));}};

const handleChatSubmit=async(e)=>{e.preventDefault();const key=modelSource==='gemini'?geminiKey:deepseekKey;if(!chatInput.trim())return;if(!key)return setShowSettings(true);const userMsg={role:'user',text:chatInput};setChatHistory(prev=>[...prev,userMsg]);setChatInput("");setIsChatting(true);const prompt=`你是物理助教。当前阅读第 ${pageNum} 页：\n${pageText.substring(0,1500)}\n提问：${userMsg.text}`;try{const result=await callLlmAPI(prompt,modelSource,key);setChatHistory(prev=>[...prev,{role:'ai',text:result}]);}catch(e){setChatHistory(prev=>[...prev,{role:'ai',text:"发送失败，请检查配置或网络"}]);}finally{setIsChatting(false);}};

const noteExec=(cmd,val)=>{noteRef.current?.focus();execCmd(cmd,val);};
const noteInsert=(html)=>{noteRef.current?.focus();insertHTML(html);setNoteContent(noteRef.current?.innerHTML||'');};

const insertTable=(rows,cols)=>{let h='<table style="border-collapse:collapse;width:100%;table-layout:auto">';h+='<thead><tr>';for(let j=0;j<cols;j++)h+=`<th style="border:1px solid #d1d5db;padding:6px 8px;resize:horizontal;overflow:auto;min-width:60px;background:#f8fafc;font-weight:600;text-align:left;font-size:13px">列${j+1}</th>`;h+='</tr></thead><tbody>';for(let i=0;i<rows;i++){h+='<tr>';for(let j=0;j<cols;j++)h+=`<td style="border:1px solid #d1d5db;padding:6px 8px;min-width:60px;font-size:13px">&nbsp;</td>`;h+='</tr>';}h+='</tbody></table><p><br></p>';noteInsert(h);setShowTableGrid(false);};

useEffect(()=>{if(formulaInput){try{setFormulaPreview(katex.renderToString(formulaInput,{throwOnError:false}));}catch(e){setFormulaPreview('<span class="text-red-500">公式语法错误</span>');}}else{setFormulaPreview('');}},[formulaInput]);
const insertFormula=()=>{if(formulaInput.trim()){noteInsert(`<span data-latex="${formulaInput.replace(/"/g,'&quot;')}">\\(${formulaInput}\\)</span> `);setFormulaInput('');setShowFormula(false);}};

const initDrawing=()=>{setShowDrawing(true);setTimeout(()=>{const c=drawCanvasRef.current;if(c){c.width=c.offsetWidth;c.height=400;drawCtxRef.current=c.getContext('2d');drawCtxRef.current.fillStyle='#ffffff';drawCtxRef.current.fillRect(0,0,c.width,c.height);}},50);};
const drawStart=(e)=>{const c=drawCanvasRef.current;if(!c)return;const r=c.getBoundingClientRect();drawIsDrawing.current=true;const ctx=drawCtxRef.current;ctx.beginPath();ctx.moveTo(e.clientX-r.left,e.clientY-r.top);ctx.strokeStyle=drawEraser?'#ffffff':drawColor;ctx.lineWidth=drawEraser?12:drawSize;ctx.lineCap='round';ctx.lineJoin='round';};
const drawMove=(e)=>{if(!drawIsDrawing.current)return;const ctx=drawCtxRef.current;if(!ctx)return;const r=drawCanvasRef.current.getBoundingClientRect();ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke();};
const drawEnd=()=>{drawIsDrawing.current=false;if(drawCtxRef.current)drawCtxRef.current.closePath();};
const clearDrawing=()=>{const c=drawCanvasRef.current;if(c&&drawCtxRef.current){drawCtxRef.current.fillStyle='#ffffff';drawCtxRef.current.fillRect(0,0,c.width,c.height);}};
const insertDrawing=()=>{const c=drawCanvasRef.current;if(c){const data=c.toDataURL('image/png');noteInsert(`<img src="${data}" style="max-width:100%"/>`);}setShowDrawing(false);};

const startScreenshot=()=>{setIsScreenshotMode(true);setScreenshotRect(null);};
const screenshotMouseDown=(e)=>{if(!isScreenshotMode||!canvasRef.current)return;const r=canvasRef.current.getBoundingClientRect();screenshotStart.current={x:e.clientX-r.left,y:e.clientY-r.top};};
const screenshotMouseMove=(e)=>{if(!isScreenshotMode||!screenshotStart.current||!canvasRef.current)return;const r=canvasRef.current.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;const sx=screenshotStart.current;setScreenshotRect({left:Math.min(sx.x,x),top:Math.min(sx.y,y),width:Math.abs(x-sx.x),height:Math.abs(y-sx.y)});};
const screenshotMouseUp=()=>{if(!isScreenshotMode||!screenshotStart.current||!screenshotRect||screenshotRect.width<5||screenshotRect.height<5)return;const c=canvasRef.current;const sc=document.createElement('canvas');sc.width=screenshotRect.width;sc.height=screenshotRect.height;sc.getContext('2d').drawImage(c,screenshotRect.left,screenshotRect.top,screenshotRect.width,screenshotRect.height,0,0,screenshotRect.width,screenshotRect.height);const data=sc.toDataURL('image/png');noteInsert(`<img src="${data}" style="max-width:100%"/>`);setIsScreenshotMode(false);setScreenshotRect(null);screenshotStart.current=null;};

const extractText=()=>{if(pageText)noteInsert(`<blockquote>${pageText.substring(0,500)}</blockquote><p><br></p>`);};
const insertImageFile=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>noteInsert(`<img src="${r.result}" style="max-width:100%"/>`);r.readAsDataURL(f);};inp.click();};

const exportMD=()=>{const html=noteRef.current?.innerHTML||'';const md=turndownService.turndown(html);const mdFixed=md.replace(/<span data-latex="([^"]*)">[^<]*<\/span>/g,(_,latex)=>`$${latex}$`);const key=`export_${paperFp||paperName||'note'}`;const count=(parseInt(localStorage.getItem(key))||0)+1;localStorage.setItem(key,String(count));const blob=new Blob([mdFixed],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`阅读笔记${count}.md`;a.click();URL.revokeObjectURL(a.href);};

const handleSaveConfig=()=>{localStorage.setItem('llm_source',modelSource);localStorage.setItem('gemini_api_key',geminiKey);localStorage.setItem('deepseek_api_key',deepseekKey);setShowSettings(false);};

if(!username)return(
<div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-indigo-50">
<div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
<div className="text-center mb-6"><div className="p-3 bg-indigo-100 rounded-xl inline-block text-indigo-600 mb-3"><Icons.FileText className="w-8 h-8"/></div><h1 className="text-xl font-bold text-slate-800">文献精读工作台</h1><p className="text-xs text-slate-400 mt-1">输入用户名以开始</p></div>
<input className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 mb-3" placeholder="你的用户名" value={loginInput} onChange={e=>setLoginInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
<button onClick={doLogin} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors">进入</button>
{recentUsers.length>0&&(<div className="mt-4"><p className="text-xs text-slate-400 mb-2">最近使用</p><div className="flex flex-wrap gap-2">{recentUsers.map(u=>(<button key={u} onClick={()=>{setLoginInput(u);setTimeout(()=>{setLoginInput(u);const s=u;setUsername(s);localStorage.setItem('ppr_user',s);dbPut('users',{username:s,lastLogin:Date.now()});loadHistory(s);},50);}} className="px-3 py-1 text-xs bg-slate-100 rounded-full hover:bg-indigo-100 hover:text-indigo-600 transition-colors">{u}</button>))}</div></div>)}
</div></div>
);

return(

<div><h1 className="text-lg font-bold leading-tight">文献精读工作台</h1><p className="text-[10px] text-slate-500 font-medium uppercase tracking-widest">{modelSource} 引擎 · {username}</p></div>

</div>))}</div>

</div></div>

<main className="flex-1 flex overflow-hidden bg-slate-100" ref={mainRef} onMouseMove={onDragMove} onMouseUp={onDragUp} onMouseLeave={onDragUp} style={{cursor:dragTarget?'col-resize':'auto',userSelect:dragTarget?'none':'auto'}}>
{showPDF&&(<div style={{width:`${split1}%`}} className="h-full flex flex-col relative overflow-hidden">

<button onClick={()=>noteExec('formatBlock','<h2>')} className="px-2 py-1 text-[11px] font-bold rounded hover:bg-slate-100 text-slate-600">H2</button>
<span className="w-px h-4 bg-slate-200 mx-0.5"/>
<button onClick={()=>noteExec('formatBlock','<blockquote>')} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="引用">"</button>
<button onClick={()=>noteExec('formatBlock','<pre>')} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="代码">&lt;/&gt;</button>
<span className="w-px h-4 bg-slate-200 mx-0.5"/>
<button onClick={()=>setShowTableGrid(true)} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="插入表格"><Icons.Table className="w-3.5 h-3.5"/></button>
<button onClick={insertImageFile} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="插入图片"><Icons.Image className="w-3.5 h-3.5"/></button>
<button onClick={()=>setShowFormula(true)} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="插入公式">&Sigma;</button>
<button onClick={initDrawing} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="涂鸦"><Icons.Pen className="w-3.5 h-3.5"/></button>
<button onClick={startScreenshot} className={`p-1.5 rounded text-slate-600 ${isScreenshotMode?'bg-indigo-100 text-indigo-600':'hover:bg-slate-100'}`} title="截取PDF区域"><Icons.Scissors className="w-3.5 h-3.5"/></button>
<button onClick={extractText} className="p-1.5 rounded hover:bg-slate-100 text-slate-600" title="摘录当前页文本">&para;</button>
</div>
<div ref={noteRef} className="note-editor flex-1 overflow-auto p-4 text-sm text-slate-700" contentEditable suppressContentEditableWarning onInput={()=>setNoteContent(noteRef.current?.innerHTML||'')} onPaste={e=>{e.preventDefault();const items=e.clipboardData?.items;if(items){for(const item of items){if(item.type.startsWith('image/')){const f=item.getAsFile();const r=new FileReader();r.onload=()=>insertHTML(`<img src="${r.result}" style="max-width:100%"/>`);r.readAsDataURL(f);return;}}}const text=e.clipboardData.getData('text');if(text){insertHTML(text);}setNoteContent(noteRef.current?.innerHTML||'');}}>{noteContent?null:<span className="text-slate-300">在这里写笔记... 支持粘贴图片、公式、表格</span>}</div>
</div>)}
</main>

{showFormula&&(<div className="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4" onClick={()=>setShowFormula(false)}><div className="bg-white rounded-xl shadow-2xl p-5 w-full max-w-md" onClick={e=>e.stopPropagation()}><div className="flex items-center justify-between mb-3"><h3 className="font-bold text-sm">插入 LaTeX 公式</h3><button onClick={()=>setShowFormula(false)}><Icons.X className="w-4 h-4 text-slate-400"/></button></div><div className="flex gap-2 mb-3 flex-wrap">{SYMBOLS.flat().map(s=><button key={s} className="symbol-btn" onClick={()=>setFormulaInput(p=>p+s)}>{s}</button>)}</div><input className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 mb-2" placeholder="如: E = mc^2" value={formulaInput} onChange={e=>setFormulaInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&insertFormula()}/>{formulaPreview&&<div className="p-3 bg-slate-50 rounded-lg text-center text-lg" dangerouslySetInnerHTML={{__html:formulaPreview}}></div>}<button onClick={insertFormula} className="w-full mt-3 bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">插入公式</button></div></div>)}

{showTableGrid&&(<div className="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4" onClick={()=>setShowTableGrid(false)}><div className="bg-white rounded-xl shadow-2xl p-4" onClick={e=>e.stopPropagation()}><p className="text-xs text-slate-500 mb-2 text-center">{tableHover.r}x{tableHover.c} 表格</p>{Array.from({length:8},(_,r)=>(<div key={r} className="flex">{Array.from({length:8},(_,c)=>(<div key={c} className={`table-grid-cell ${r<tableHover.r&&c<tableHover.c?'active':''}`} onMouseEnter={()=>setTableHover({r:r+1,c:c+1})} onClick={()=>insertTable(r+1,c+1)}/>))}</div>))}</div></div>)}

{showDrawing&&(<div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-xl shadow-2xl p-4 w-full max-w-2xl"><div className="flex items-center justify-between mb-3"><h3 className="font-bold text-sm">涂鸦</h3><button onClick={()=>setShowDrawing(false)}><Icons.X className="w-4 h-4 text-slate-400"/></button></div><div className="flex items-center gap-3 mb-3"><input type="color" value={drawColor} onChange={e=>{setDrawColor(e.target.value);setDrawEraser(false);}} className="w-8 h-8 rounded cursor-pointer"/><input type="range" min="1" max="20" value={drawSize} onChange={e=>setDrawSize(parseInt(e.target.value))} className="w-24"/><button onClick={()=>setDrawEraser(!drawEraser)} className={`px-3 py-1 text-xs rounded ${drawEraser?'bg-rose-100 text-rose-600':'bg-slate-100 text-slate-600'}`}>橡皮擦</button><button onClick={clearDrawing} className="px-3 py-1 text-xs rounded bg-slate-100 text-slate-600">清除</button></div><canvas ref={drawCanvasRef} className="w-full border border-slate-200 rounded-lg" style={{height:400}} onMouseDown={drawStart} onMouseMove={drawMove} onMouseUp={drawEnd} onMouseLeave={drawEnd}></canvas><div className="flex justify-end gap-2 mt-3"><button onClick={()=>setShowDrawing(false)} className="px-4 py-2 text-sm bg-slate-100 rounded-lg">取消</button><button onClick={insertDrawing} className="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg">插入笔记</button></div></div></div>)}
</div>
);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文献精读工作台 - 双引擎增强版</title>
  
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.body.innerHTML = '<div style="padding:40px; color:#b91c1c; background:#fef2f2; height:100vh;">' +
        '<h2>页面加载错误 🔧</h2><p>' + msg + '</p></div>';
      return false;
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = '';
  </script>

  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
    .markdown-body p { margin-bottom: 0.75em; line-height: 1.6; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
    .markdown-body strong { color: #0f172a; }
    canvas { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); border-radius: 4px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .divider-resize {
      width: 6px; cursor: col-resize;
      background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 50%, #e2e8f0 100%);
      transition: background 0.15s; flex-shrink: 0; position: relative;
    }
    .divider-resize:hover, .divider-resize.active {
      background: linear-gradient(90deg, #818cf8 0%, #6366f1 50%, #818cf8 100%);
    }
    .divider-resize::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); width: 2px; height: 32px;
      background: #94a3b8; border-radius: 2px;
    }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      FileText: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
      Upload: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      ChevronLeft: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronRight: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Settings: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Loader: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>,
      Language: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>,
      Sparkles: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z"/></svg>,
      Brain: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.38A4 4 0 0 0 4 9c0 2.21 1.79 4 4 4h4"/><path d="M17 13a4.5 4.5 0 0 0-3-4"/><path d="M12 10h4a4 4 0 0 0 4-4c0-2.21-1.79-4-4-4a3 3 0 1 0-5.997.125"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>,
      GradCap: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
      ChevronDown: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      ChevronUp: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
      X: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      MessageCircle: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
      Send: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
      User: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Bot: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
      AlertCircle: ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    };

    const callLlmAPI = async (prompt, modelSource, apiKey) => {
      if (modelSource === 'deepseek') {
        const url = 'https://api.deepseek.com/chat/completions';
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "deepseek-chat",
            messages: [{ role: "user", content: prompt }],
            stream: false
          })
        });
        if (!response.ok) throw new Error(`DeepSeek Error: ${response.status}`);
        const data = await response.json();
        return data.choices[0].message.content;
      } else {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (!response.ok) {
          if (response.status === 429) throw new Error("429");
          throw new Error(`Gemini Error: ${response.status}`);
        }
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text;
      }
    };

    const renderMarkdown = (text) => {
      if (!text) return { __html: "" };
      const mathBlocks = [];
      let html = text
        .replace(/\$\$([\s\S]*?)\$\$/g, (_, m) => {
          const i = mathBlocks.length;
          try { mathBlocks.push(katex.renderToString(m.trim(), { displayMode: true, throwOnError: false })); }
          catch(e) { mathBlocks.push(`<code>${m}</code>`); }
          return `%%MD${i}%%`;
        })
        .replace(/\$(.+?)\$/g, (_, m) => {
          const i = mathBlocks.length;
          try { mathBlocks.push(katex.renderToString(m.trim(), { displayMode: false, throwOnError: false })); }
          catch(e) { mathBlocks.push(`<code>${m}</code>`); }
          return `%%MI${i}%%`;
        });
      html = html
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>');
      html = `<p>${html}</p>`
        .replace(/%%MD(\d+)%%/g, (_, i) => mathBlocks[parseInt(i)])
        .replace(/%%MI(\d+)%%/g, (_, i) => mathBlocks[parseInt(i)]);
      return { __html: html };
    };

    const ACTION_META = {
      translate: { title: "本页翻译", color: "blue", icon: Icons.Language },
      explain: { title: "大白话讲解", color: "indigo", icon: Icons.Sparkles }
    };

    function App() {
      const [modelSource, setModelSource] = useState(localStorage.getItem('llm_source') || 'gemini');
      const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      const [deepseekKey, setDeepseekKey] = useState(localStorage.getItem('deepseek_api_key') || '');
      const [showSettings, setShowSettings] = useState(false);
      
      const [pdfDoc, setPdfDoc] = useState(null);
      const [pageNum, setPageNum] = useState(1);
      const [numPages, setNumPages] = useState(0);
      const [isRendering, setIsRendering] = useState(false);
      const [pageText, setPageText] = useState(""); 
      const canvasRef = useRef(null);

      const [aiMode, setAiMode] = useState('cards');
      const [pageAiData, setPageAiData] = useState({});
      const [chatHistory, setChatHistory] = useState([]);
      const [chatInput, setChatInput] = useState("");
      const [isChatting, setIsChatting] = useState(false);
      const chatScrollRef = useRef(null);
      const mainRef = useRef(null);
      const [splitRatio, setSplitRatio] = useState(50);
      const [isDragging, setIsDragging] = useState(false);
      const handleMouseDown = () => setIsDragging(true);
      const handleMouseUp = () => setIsDragging(false);
      const handleMouseMove = (e) => {
        if (!isDragging || !mainRef.current) return;
        const rect = mainRef.current.getBoundingClientRect();
        const ratio = Math.max(20, Math.min(80, ((e.clientX - rect.left) / rect.width) * 100));
        setSplitRatio(ratio);
      };

      const handleSaveConfig = () => {
        localStorage.setItem('llm_source', modelSource);
        localStorage.setItem('gemini_api_key', geminiKey);
        localStorage.setItem('deepseek_api_key', deepseekKey);
        setShowSettings(false);
      };

      const handleFileUpload = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        try {
          setIsRendering(true);
          setPageAiData({}); 
          setChatHistory([{ role: 'ai', text: "文献已载入。我是您的 AI 助教，支持 Gemini 和 DeepSeek 双引擎。您可以随时向我提问。" }]);
          const arrayBuffer = await file.arrayBuffer();
          const loadedPdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          setPdfDoc(loadedPdf);
          setNumPages(loadedPdf.numPages);
          setPageNum(1); 
        } catch (e) { alert("PDF 加载失败"); setIsRendering(false); }
      };

      useEffect(() => {
        let renderTask = null;
        const renderPage = async () => {
          if (!pdfDoc || !canvasRef.current) return;
          setIsRendering(true);
          try {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = canvasRef.current;
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            renderTask = page.render({ canvasContext: context, viewport: viewport });
            await renderTask.promise;
            const textContent = await page.getTextContent();
            setPageText(textContent.items.map(item => item.str).join(" ").replace(/\s+/g, " "));
          } catch (e) {} finally { setIsRendering(false); }
        };
        renderPage();
        return () => renderTask?.cancel();
      }, [pdfDoc, pageNum]);

      useEffect(() => {
        if (aiMode === 'chat' && chatScrollRef.current) {
          chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
        }
      }, [chatHistory, isChatting, aiMode]);

      const triggerAI = async (actionType) => {
        const key = modelSource === 'gemini' ? geminiKey : deepseekKey;
        if (!key) return setShowSettings(true);
        if (!pageText) return alert("当前页无文本");

        const targetPage = pageNum;
        const currentData = pageAiData[targetPage] || {};
        if (currentData[actionType]?.status === 'success') {
          setPageAiData(prev => ({ ...prev, [targetPage]: { ...prev[targetPage], [actionType]: { ...prev[targetPage][actionType], isExpanded: true } } }));
          return;
        }
        if (currentData[actionType]?.status === 'loading') return;

        setPageAiData(prev => ({ ...prev, [targetPage]: { ...prev[targetPage], [actionType]: { status: 'loading', data: '', isExpanded: true } } }));

        let prompt = "";
        const prompts = {
          translate: `翻译以下学术段落为地道中文，保留 LaTeX 公式（用 $...$ 或 $$...$$ 包裹）：\n${pageText}`,
          explain: `用直白大白话（带比喻）讲解本页物理核心，保留 LaTeX 公式（用 $...$ 或 $$...$$ 包裹）：\n${pageText}`
        };
        prompt = prompts[actionType];

        try {
          const result = await callLlmAPI(prompt, modelSource, key);
          setPageAiData(prev => ({ ...prev, [targetPage]: { ...prev[targetPage], [actionType]: { status: 'success', data: result, isExpanded: true } } }));
        } catch (error) {
          let msg = "请求失败";
          if (error.message === "429") msg = "频率受限，请稍后";
          setPageAiData(prev => ({ ...prev, [targetPage]: { ...prev[targetPage], [actionType]: { status: 'error', data: msg, isExpanded: true } } }));
        }
      };

      const handleChatSubmit = async (e) => {
        e.preventDefault();
        const key = modelSource === 'gemini' ? geminiKey : deepseekKey;
        if (!chatInput.trim()) return;
        if (!key) return setShowSettings(true);

        const userMsg = { role: 'user', text: chatInput };
        setChatHistory(prev => [...prev, userMsg]);
        setChatInput("");
        setIsChatting(true);

        const prompt = `你是物理助教。当前阅读第 ${pageNum} 页：\n${pageText.substring(0,1500)}\n提问：${userMsg.text}`;
        try {
          const result = await callLlmAPI(prompt, modelSource, key);
          setChatHistory(prev => [...prev, { role: 'ai', text: result }]);
        } catch (e) {
          setChatHistory(prev => [...prev, { role: 'ai', text: "发送失败，请检查配置或网络" }]);
        } finally { setIsChatting(false); }
      };

      return (
        <div className="min-h-screen flex flex-col h-screen overflow-hidden">
          <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">
            <div className="flex items-center space-x-3 text-slate-800">
              <div className="p-1.5 bg-indigo-100 rounded-lg text-indigo-600"><Icons.FileText className="w-5 h-5" /></div>
              <div><h1 className="text-lg font-bold leading-tight">文献精读工作台</h1><p className="text-[10px] text-slate-500 font-medium uppercase tracking-widest">{modelSource} 引擎驱动</p></div>
            </div>
            <div className="flex items-center space-x-4">
              <label className="flex items-center text-sm font-medium text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg cursor-pointer transition-colors shadow-sm">
                <Icons.Upload className="w-4 h-4 mr-2" />上传 PDF
                <input type="file" hidden accept=".pdf" onChange={handleFileUpload} />
              </label>
              <button onClick={() => setShowSettings(true)} className="flex items-center text-sm font-medium text-slate-500 hover:text-indigo-600 px-2 py-2 transition-colors"><Icons.Settings className="w-5 h-5" /></button>
            </div>
          </header>

          {/* ----- 设置弹窗：智能联动输入框 ----- */}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
                <h3 className="text-xl font-bold mb-4">配置 AI 引擎</h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1">选择当前引擎</label>
                    <select value={modelSource} onChange={e => setModelSource(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                      <option value="gemini">Gemini 2.5 (需要网络助理)</option>
                      <option value="deepseek">DeepSeek (国内极速直连)</option>
                    </select>
                  </div>
                  
                  {/* 核心改动点：动态显示对应引擎的输入框 */}
                  <div className="mt-4">
                    <label className="block text-xs font-bold text-slate-400 uppercase mb-1">
                      {modelSource === 'gemini' ? 'Gemini API Key' : 'DeepSeek API Key'}
                    </label>
                    <input 
                      type="password" 
                      value={modelSource === 'gemini' ? geminiKey : deepseekKey} 
                      onChange={e => modelSource === 'gemini' ? setGeminiKey(e.target.value) : setDeepseekKey(e.target.value)} 
                      className="w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" 
                      placeholder={modelSource === 'gemini' ? "AIzaSy..." : "sk-..."} 
                    />
                  </div>
                  
                </div>
                <div className="flex justify-end space-x-2 mt-6">
                  <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm bg-slate-100 rounded-lg">取消</button>
                  <button onClick={handleSaveConfig} className="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg">保存配置</button>
                </div>
              </div>
            </div>
          )}

          <main className="flex-1 flex overflow-hidden bg-slate-100" ref={mainRef} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} style={{cursor: isDragging ? 'col-resize' : 'auto', userSelect: isDragging ? 'none' : 'auto'}}>
            <div style={{width: `${splitRatio}%`}} className="h-full flex flex-col relative overflow-hidden">
              <div className="h-10 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 shadow-sm z-10">
                <button onClick={() => setPageNum(p => Math.max(1, p-1))} className="p-1 rounded text-slate-600 hover:bg-slate-100"><Icons.ChevronLeft className="w-5 h-5" /></button>
                <div className="text-xs font-bold text-slate-500">{pdfDoc ? `第 ${pageNum} / ${numPages} 页` : '待上传'}</div>
                <button onClick={() => setPageNum(p => Math.min(numPages, p+1))} className="p-1 rounded text-slate-600 hover:bg-slate-100"><Icons.ChevronRight className="w-5 h-5" /></button>
              </div>
              <div className="flex-1 overflow-auto flex justify-center p-4 relative">
                {!pdfDoc ? (
                  <div className="flex flex-col items-center justify-center text-slate-300 h-full"><Icons.FileText className="w-16 h-16 mb-4 opacity-20" /><p>点击上方按钮上传 PDF</p></div>
                ) : (
                  <div className="relative inline-block">
                    {isRendering && <div className="absolute inset-0 bg-white/60 flex items-center justify-center z-10"><Icons.Loader className="w-8 h-8 text-indigo-500 animate-spin" /></div>}
                    <canvas ref={canvasRef} className="max-w-full h-auto bg-white shadow-lg"></canvas>
                  </div>
                )}
              </div>
            </div>
            <div className={`divider-resize ${isDragging ? 'active' : ''}`} onMouseDown={handleMouseDown}></div>
            <div style={{width: `${100 - splitRatio}%`}} className="h-full flex flex-col bg-white overflow-hidden">
              <div className="flex bg-slate-100 p-1 m-4 mb-2 rounded-lg shrink-0 w-fit">
                <button onClick={() => setAiMode('cards')} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${aiMode === 'cards' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>快捷操作</button>
                <button onClick={() => setAiMode('chat')} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-all ${aiMode === 'chat' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>自由对话</button>
              </div>

              {aiMode === 'cards' ? (
                <div className="flex-1 flex flex-col overflow-hidden">
                  <div className="px-4 pb-4 grid grid-cols-2 gap-2 shrink-0">
                    {Object.keys(ACTION_META).map(key => {
                      const meta = ACTION_META[key];
                      const ActionIcon = meta.icon;
                      const isCached = pageAiData[pageNum]?.[key]?.status === 'success';
                      return (
                        <button key={key} onClick={() => triggerAI(key)} disabled={!pdfDoc} className={`flex flex-col items-center justify-center p-2 rounded-xl border transition-all relative ${isCached ? 'border-green-200 bg-green-50' : 'border-slate-200 bg-white hover:border-indigo-300 hover:shadow-md'}`}>
                          <ActionIcon className={`w-5 h-5 mb-1 ${isCached ? 'text-green-600' : 'text-slate-400'}`} />
                          <span className={`text-[10px] font-bold ${isCached ? 'text-green-700' : 'text-slate-600'}`}>{meta.title}</span>
                          {isCached && <div className="absolute top-1 right-1 w-1.5 h-1.5 rounded-full bg-green-500"></div>}
                        </button>
                      )
                    })}
                  </div>
                  <div className="flex-1 overflow-auto p-4 bg-slate-50 space-y-4">
                    {Object.entries(pageAiData[pageNum] || {}).map(([type, card]) => (
                      <div key={type} className={`rounded-xl shadow-sm border overflow-hidden ${card.status === 'error' ? 'border-red-200' : 'border-slate-200 bg-white'}`}>
                        <div className="flex items-center justify-between px-4 py-3 cursor-pointer select-none bg-slate-50/50" onClick={() => setPageAiData(prev => ({ ...prev, [pageNum]: { ...prev[pageNum], [type]: { ...card, isExpanded: !card.isExpanded } } }))}>
                          <div className="flex items-center font-bold text-xs">
                            {card.status === 'loading' ? <Icons.Loader className="w-3.5 h-3.5 mr-2 animate-spin text-indigo-500" /> : <Icons.MessageCircle className={`w-3.5 h-3.5 mr-2 text-${ACTION_META[type].color}-500`} />}
                            {ACTION_META[type].title}
                          </div>
                          <div className="flex items-center space-x-2">
                             {card.isExpanded ? <Icons.ChevronUp className="w-4 h-4 text-slate-400"/> : <Icons.ChevronDown className="w-4 h-4 text-slate-400"/>}
                             <button onClick={(e) => { e.stopPropagation(); setPageAiData(prev => { const d = {...prev[pageNum]}; delete d[type]; return {...prev, [pageNum]: d}; }); }} className="text-slate-300 hover:text-red-500"><Icons.X className="w-3.5 h-3.5"/></button>
                          </div>
                        </div>
                        {card.isExpanded && (
                          <div className="p-4 border-t border-slate-50">
                            {card.status === 'loading' ? <div className="animate-pulse space-y-2"><div className="h-3 bg-slate-100 rounded w-3/4"></div><div className="h-3 bg-slate-100 rounded w-full"></div></div> : <div className="markdown-body text-xs text-slate-700" dangerouslySetInnerHTML={renderMarkdown(card.data)} />}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="flex-1 flex flex-col overflow-hidden bg-slate-50/50">
                  <div ref={chatScrollRef} className="flex-1 overflow-y-auto p-4 space-y-4">
                    {chatHistory.map((m, i) => (
                      <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`flex max-w-[85%] ${m.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                          <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${m.role === 'user' ? 'bg-indigo-100 text-indigo-600 ml-2' : 'bg-slate-800 text-white mr-2'}`}>
                            {m.role === 'user' ? <Icons.User className="w-4 h-4" /> : <Icons.Bot className="w-4 h-4" />}
                          </div>
                          <div className={`p-3 rounded-2xl text-xs ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 shadow-sm rounded-tl-none'}`}>
                            {m.role === 'user' ? m.text : <div className="markdown-body" dangerouslySetInnerHTML={renderMarkdown(m.text)} />}
                          </div>
                        </div>
                      </div>
                    ))}
                    {isChatting && <div className="flex space-x-1 p-2"><div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></div><div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce delay-75"></div><div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce delay-150"></div></div>}
                  </div>
                  <form onSubmit={handleChatSubmit} className="p-4 bg-white border-t border-slate-200">
                    <div className="relative flex items-center bg-slate-100 rounded-xl overflow-hidden px-3">
                      <input className="flex-1 bg-transparent py-3 text-xs outline-none" placeholder="关于这篇文献，想问点什么？" value={chatInput} onChange={e => setChatInput(e.target.value)} />
                      <button type="submit" disabled={isChatting} className="text-indigo-600 disabled:opacity-30"><Icons.Send className="w-4 h-4" /></button>
                    </div>
                  </form>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
